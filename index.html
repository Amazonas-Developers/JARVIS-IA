<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazonas 365 — Chat con LM Studio</title>
    <script>
      // Aplica el tema guardado ANTES de renderizar para evitar el parpadeo.
      // La clave 'a365_theme' debe coincidir con src/libs/storage.ts
      (function () {
        try {
          var t = localStorage.getItem('a365_theme');
          if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
